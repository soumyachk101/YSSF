databases:
  - name: yssf-db
    plan: free
    databaseName: yssf
    ipAllowList: []

services:
  - type: web
    name: yssf-backend
    plan: free
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npx prisma db push --accept-data-loss && npx prisma generate && npx prisma db seed && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yssf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://yssfd.vercel.app
      - key: NODE_ENV
        value: production
